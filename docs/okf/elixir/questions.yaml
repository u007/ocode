# Elixir (1.16+/OTP) benchmark corpus — SOURCE OF TRUTH.
# Format: docs/okf/_schema/question-format.md. Grade with rubric-guide.md.
# corpus_rev must match meta.yaml (1). Version scope: Elixir >=1.16; the few
# version-gated bits (Duration / to_timeout/1, set-theoretic type preview — both
